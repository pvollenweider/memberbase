services:
  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
      - ./conf:/var/www/conf
      - ./logs:/var/www/logs
    environment:
      DB_HOST: mariadb
      DB_NAME: members
      DB_USER: members
      DB_PASS: members
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: members
      MARIADB_USER: members
      MARIADB_PASSWORD: members
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-umembers", "-pmembers"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  adminer:
    image: adminer
    ports:
      - "8082:8080"
    depends_on:
      - mariadb

volumes:
  mariadb_data:
