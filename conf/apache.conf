<VirtualHost *:80>
    ServerAdmin webmaster@casa-alianza.ch
    ServerName membres.casa-alianza.ch
    #ServerAlias m2.casa-alianza.ch
    #ServerAlias db.casa-alianza.ch
    #ServerAlias db2.casa-alianza.ch

    #SSLCertificateFile    /var/www/vhosts/www2.casa-alianza.ch/conf/ssl/certificate-243008.crt
    #SSLCertificateKeyFile /var/www/vhosts/www2.casa-alianza.ch/conf/ssl/www2.casa-alianza.ch.key


    DocumentRoot    /var/www/vhosts/membres.casa-alianza.ch/html
    CustomLog /var/log/apache2/membres.casa-alianza.ch-access_log combined
    
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} ^(TRACE|TRACK)
    RewriteRule .* - [F]
    
    <Directory "/var/www/vhosts/membres.casa-alianza.ch/html">
        Options None
        AllowOverride None
        AllowOverride AuthConfig
        order deny,allow
        allow from all
        AuthName "Autentification"
        AuthType Basic
        AuthUserFile /var/www/vhosts/membres.casa-alianza.ch/conf/htpasswd
        Require valid-user
    </Directory>

    # Deny direct HTTP access to server-side include/class/locale directories
    <Directory "/var/www/vhosts/membres.casa-alianza.ch/html/includes">
        Require all denied
    </Directory>
    <Directory "/var/www/vhosts/membres.casa-alianza.ch/html/classes">
        Require all denied
    </Directory>
    <Directory "/var/www/vhosts/membres.casa-alianza.ch/html/locales">
        Require all denied
    </Directory>
        Alias /share /home/casaserv/backup/share

<Directory "/home/casaserv/backup/share">
    Options Indexes FollowSymLinks
    IndexOrderDefault Ascending Name
    IndexOptions  +NameWidth=50 FancyIndexing SuppressHTMLPreamble +DescriptionWidth=*
        AllowOverride None
        AllowOverride AuthConfig
        order deny,allow
        allow from all
        AuthName "Autentification"
        AuthType Basic
        AuthUserFile /var/www/vhosts/membres.casa-alianza.ch/conf/htpasswd
        Require valid-user
    </Directory>

    # Insert filter
SetOutputFilter DEFLATE
    
    # Netscape 4.x has some problems...
BrowserMatch ^Mozilla/4 gzip-only-text/html
    
    # Netscape 4.06-4.08 have some more problems
    BrowserMatch ^Mozilla/4\.0[678] no-gzip
    
    # MSIE masquerades as Netscape, but it is fine
    # BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
    
    # NOTE: Due to a bug in mod_setenvif up to Apache 2.0.48
    # the above regex won't work. You can use the following
    # workaround to get the desired effect:
    BrowserMatch \bMSI[E] !no-gzip !gzip-only-text/html
    
    # Don't compress images
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png)$ no-gzip dont-vary
    
    # Make sure proxies don't deliver the wrong content
    #Header append Vary User-Agent env=!dont-vary    
RewriteCond %{SERVER_NAME} =membres.casa-alianza.ch
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
