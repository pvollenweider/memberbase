AddType font/woff2    .woff2
AddType image/svg+xml .svg

# All first-party/vendor CSS and JS is UTF-8 (e.g. the DataTables Buttons
# "✓" glyph) but Apache doesn't send a charset for text/css or
# application/javascript by default. Without it, a tool that reads the file
# directly (no referring HTML document to inherit <meta charset> from) falls
# back to Latin-1 and mangles multibyte characters.
AddCharset UTF-8 .css .js

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory "/var/www/html">
        Options None
        AllowOverride All
        Require all granted
    </Directory>

    <Directory "/var/www/html/api">
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteRule ^contacts/([0-9]+)/groups/?$    contacts.php?id=$1&sub=groups [QSA,L]
        RewriteRule ^contacts/([0-9]+)/?$           contacts.php?id=$1            [QSA,L]
        RewriteRule ^contacts/?$                    contacts.php                  [QSA,L]
        RewriteRule ^compta/([0-9]+)/?$             compta.php?id=$1              [QSA,L]
        RewriteRule ^compta/?$                      compta.php                    [QSA,L]
        RewriteRule ^compta-types/?$                compta-types.php              [QSA,L]
        RewriteRule ^suivi/([0-9]+)/?$              suivi.php?id=$1               [QSA,L]
        RewriteRule ^suivi/?$                       suivi.php                     [QSA,L]
        RewriteRule ^segments/([0-9]+)/members/?$   segments.php?id=$1&sub=members [QSA,L]
        RewriteRule ^segments/([0-9]+)/?$           segments.php?id=$1            [QSA,L]
        RewriteRule ^segments/?$                    segments.php                  [QSA,L]
    </Directory>

    # ---------------------------------------------------------
    # Cache-Control (mod_headers)
    # ---------------------------------------------------------
    <IfModule mod_headers.c>
        # Static assets — 1 year, no immutable (no filename fingerprinting)
        <FilesMatch "\.(css|js|woff2|svg|png|jpg|jpeg|webp|ico)$">
            Header always set Cache-Control "public, max-age=31536000"
        </FilesMatch>

        # PDFs — always revalidate via ETag
        <LocationMatch "^/docs/[^/]+\.pdf$">
            Header always set Cache-Control "no-cache, must-revalidate"
        </LocationMatch>

        # PHP pages — private, never proxy-cached
        <FilesMatch "\.php$">
            Header always set Cache-Control "private, no-store"
        </FilesMatch>

        # -----------------------------------------------------
        # Security headers (#70)
        # -----------------------------------------------------
        # Enforced — no risk of breaking the front:
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "DENY"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        # HSTS: ignored by browsers over plain HTTP (dev :80), enforced on
        # HTTPS. Safe to declare here; keep it in the prod HTTPS vhost too.
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        # Content-Security-Policy in REPORT-ONLY (#70/#93): it does NOT block,
        # it only reports violations to the console. The whole front is now
        # self-hosted (vendored CSS/JS, incl. TipTap — see js/vendor/), so there
        # is NO external origin: esm.sh has been removed (#93). Inline
        # handlers/styles still need 'unsafe-inline' for now. Remaining steps to
        # enforce: validate zero console violations, replace 'unsafe-inline'
        # with nonces, then rename this header to "Content-Security-Policy".
        Header always set Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    </IfModule>

    # ---------------------------------------------------------
    # Expires / HTTP 1.0 proxies (mod_expires)
    # ---------------------------------------------------------
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault                          "access plus 1 month"
        ExpiresByType text/html                 "access plus 0 seconds"
        ExpiresByType text/css                  "access plus 1 year"
        ExpiresByType application/javascript    "access plus 1 year"
        ExpiresByType font/woff2                "access plus 1 year"
        ExpiresByType image/svg+xml             "access plus 1 year"
        ExpiresByType image/webp                "access plus 1 year"
        ExpiresByType image/png                 "access plus 1 year"
        ExpiresByType image/jpeg                "access plus 1 year"
        ExpiresByType image/x-icon              "access plus 1 year"
    </IfModule>

    # ---------------------------------------------------------
    # Compression — Brotli preferred, Deflate fallback
    # ---------------------------------------------------------
    <IfModule mod_brotli.c>
        AddOutputFilterByType BROTLI_COMPRESS \
            text/html text/plain text/css \
            text/javascript application/javascript \
            application/json image/svg+xml
    </IfModule>

    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html text/plain text/css \
            text/javascript application/javascript \
            application/json image/svg+xml
        DeflateCompressionLevel 6
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
