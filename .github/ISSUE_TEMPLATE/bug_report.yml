name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: "8.2"

  - type: input
    id: db
    attributes:
      label: Database version
      placeholder: "MariaDB 11"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error logs, etc.
